# Server Configuration
# Render provides the PORT environment variable automatically.
server.port=${PORT:8080}

# Database Configuration
# Spring Boot automatically maps SPRING_DATASOURCE_URL environment variable to spring.datasource.url
# We leave these empty or remove them to allow automatic mapping.
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cloudinary Configuration
# Spring Boot automatically maps CLOUDINARY_URL environment variable to cloudinary.url

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Thymeleaf
spring.thymeleaf.cache=false
