<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Search Students & Notes')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container content-wrapper">
        <h2 class="mb-4 text-center">Find Students & Notes</h2>

        <div class="card shadow-sm mb-5">
            <div class="card-body p-4">
                <form th:action="@{/search}" method="get" class="row g-3">
                    <div class="col-md-4">
                        <label for="studentName" class="form-label">Search by Student Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" id="studentName" name="studentName" th:value="${studentName}" placeholder="Enter name...">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label for="university" class="form-label">University Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-building text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" id="university" name="university" th:value="${university}" placeholder="Filter university...">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label for="category" class="form-label">Category Filter</label>
                        <select class="form-select" id="category" name="category">
                            <option value="">All Categories</option>
                            <option value="Computer Science" th:selected="${selectedCategory == 'Computer Science'}">Computer Science</option>
                            <option value="Mathematics" th:selected="${selectedCategory == 'Mathematics'}">Mathematics</option>
                            <option value="Physics" th:selected="${selectedCategory == 'Physics'}">Physics</option>
                            <option value="Chemistry" th:selected="${selectedCategory == 'Chemistry'}">Chemistry</option>
                            <option value="Management" th:selected="${selectedCategory == 'Management'}">Management</option>
                            <option value="Other" th:selected="${selectedCategory == 'Other'}">Other</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Find Notes</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="row" th:if="${notes != null}">
            <div class="col-12">
                <h4 class="mb-3 border-bottom pb-2" th:text="${notes.empty ? 'No students or notes found' : notes.size() + ' Results Found'}">Results</h4>
                
                <div th:if="${notes.empty}" class="text-center py-5">
                    <i class="bi bi-person-x display-1 text-muted mb-3"></i>
                    <p class="lead">No results found for this criteria.</p>
                </div>

                <div class="row row-cols-1 row-cols-md-3 g-4" th:if="${!notes.empty}">
                    <div th:each="note : ${notes}" class="col">
                        <div class="card h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between mb-3 align-items-center">
                                    <span class="badge bg-secondary px-2 py-1" th:text="${note.category != null ? note.category : 'General'}">Category</span>
                                    <small class="text-muted"><i class="bi bi-calendar3 me-1"></i><span th:text="${note.uploadDate}">Date</span></small>
                                </div>
                                <h5 class="card-title mb-1" th:text="${note.title}">Note Title</h5>
                                <p class="card-text text-muted small mb-3" th:text="${note.description}">Description</p>
                                
                                <div class="mt-auto border-top pt-3">
                                    <p class="mb-1 fw-bold"><i class="bi bi-person-circle me-2 text-primary"></i><span th:text="${note.userName}">Student Name</span></p>
                                    <p class="mb-0 text-muted small"><i class="bi bi-building me-2"></i><span th:text="${note.university}">University</span></p>
                                </div>
                            </div>
                            <div class="card-footer bg-transparent border-top-0 pb-3">
                                <div class="d-flex gap-2">
                                    <a th:href="@{'/view-note/' + ${note.id}}" class="btn btn-primary btn-sm flex-grow-1"><i class="bi bi-eye me-1"></i>View</a>
                                    <a th:href="@{'/download/' + ${note.id}}" class="btn btn-success btn-sm flex-grow-1"><i class="bi bi-download me-1"></i>Download</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-5" th:if="${notes == null}">
            <div class="col-12 text-center text-muted py-5">
                <i class="bi bi-person-search display-1 mb-3 d-block"></i>
                <p class="lead">Enter a Student Name or filter by University/Category above.</p>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
