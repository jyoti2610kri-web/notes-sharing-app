<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Reset Password')}"></head>
<body class="bg-light">
    <div class="container content-wrapper">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body p-5 text-center">
                        <i class="bi bi-key text-primary display-4 mb-4"></i>
                        <h2 class="card-title mb-4">Reset Password</h2>
                        <p class="text-muted mb-4">Enter the 6-digit OTP sent to your email and your new password.</p>
                        
                        <div th:if="${error}" class="alert alert-danger mb-4" th:text="${error}">Error</div>
                        <div th:if="${success}" class="alert alert-success mb-4" th:text="${success}">Success</div>
                        
                        <form th:action="@{/reset-password}" method="post">
                            <input type="hidden" name="email" th:value="${email}">
                            <div class="mb-3 text-start">
                                <label for="otp" class="form-label">OTP Code</label>
                                <input type="text" class="form-control" id="otp" name="otp" required placeholder="Enter 6-digit OTP">
                            </div>
                            <div class="mb-4 text-start">
                                <label for="newPassword" class="form-label">New Password</label>
                                <input type="password" class="form-control" id="newPassword" name="newPassword" required placeholder="Enter new password">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">Reset Password</button>
                            <p class="mb-0"><a th:href="@{/login}" class="text-decoration-none">Back to Login</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
