<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Login')}"></head>
<body class="bg-light">
    <div class="container content-wrapper">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body p-5 text-center">
                        <i class="bi bi-journal-bookmark-fill text-primary display-4 mb-4"></i>
                        <h2 class="card-title mb-4">Login to NoteShare</h2>
                        
                        <div th:if="${error}" class="alert alert-danger mb-4" th:text="${error}">Error</div>
                        <div th:if="${success}" class="alert alert-success mb-4" th:text="${success}">Success</div>
                        
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3 text-start">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
                            </div>
                            <div class="mb-4 text-start">
                                <label for="password" class="form-label">Password</label>
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <span></span>
                                    <a th:href="@{/forgot-password}" class="text-decoration-none small">Forgot password?</a>
                                </div>
                                <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                            <p class="mb-0">Don't have an account? <a th:href="@{/register}" class="text-decoration-none">Register here</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
