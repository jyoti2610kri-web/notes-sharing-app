<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('View Note')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container content-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 th:text="${note.title}">Note Title</h2>
                <p class="text-muted mb-0">
                    Uploaded by <span class="fw-bold" th:text="${note.userName}">Student</span> 
                    from <span class="fw-bold" th:text="${note.university}">University</span>
                </p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{'/download/' + ${note.id}}" class="btn btn-success">
                    <i class="bi bi-download me-1"></i>Download
                </a>
                <button onclick="history.back()" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Back
                </button>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-0">
                <!-- PDF Viewer (Cloudinary PDF URL can be displayed in iframe) -->
                <div th:if="${isPdf}" class="ratio ratio-16x9" style="min-height: 80vh;">
                    <iframe th:src="${note.filename}" title="PDF Viewer" allowfullscreen></iframe>
                </div>
                
                <!-- Image Viewer -->
                <div th:if="${!isPdf}" class="text-center p-3">
                    <img th:src="${note.filename}" class="img-fluid rounded shadow-sm" alt="Note Image">
                </div>
            </div>
            <div class="card-footer bg-light">
                <p class="mb-1"><strong>Description:</strong></p>
                <p class="mb-0" th:text="${note.description}">Description text here...</p>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
