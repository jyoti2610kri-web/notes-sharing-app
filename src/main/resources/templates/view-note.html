<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('View Note')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container content-wrapper">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 th:text="${note.title}">Note Title</h2>
                <p class="text-muted mb-0">
                    Uploaded by <span class="fw-bold" th:text="${note.userName}">Student</span> 
                    from <span class="fw-bold" th:text="${note.university}">University</span>
                </p>
                <span class="badge bg-info text-dark" th:text="${note.category}">Category</span>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{'/download/' + ${note.id}}" class="btn btn-success">
                    <i class="bi bi-download me-1"></i>Download PDF
                </a>
                <button onclick="history.back()" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Back
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-light">
                        <p class="mb-0"><strong>Description:</strong> <span th:text="${note.description}">Description text...</span></p>
                    </div>
                    <div class="card-body p-0">
                        <!-- Bootstrap Carousel for Sliding Images -->
                        <div id="noteCarousel" class="carousel slide bg-dark" data-bs-ride="carousel">
                            <div class="carousel-indicators" th:if="${note.imageUrls.size() > 1}">
                                <button th:each="url, iterStat : ${note.imageUrls}" 
                                        type="button" 
                                        data-bs-target="#noteCarousel" 
                                        th:data-bs-slide-to="${iterStat.index}" 
                                        th:class="${iterStat.index == 0} ? 'active' : ''" 
                                        aria-current="true"></button>
                            </div>
                            <div class="carousel-inner">
                                <div th:each="url, iterStat : ${note.imageUrls}" 
                                     th:class="${iterStat.index == 0} ? 'carousel-item active' : 'carousel-item'">
                                    <div class="d-flex justify-content-center align-items-center" style="min-height: 500px; max-height: 800px;">
                                        <img th:src="${url}" class="d-block img-fluid" style="max-height: 800px; object-fit: contain;" alt="Note Page">
                                    </div>
                                    <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded">
                                        <p class="mb-0">Page <span th:text="${iterStat.index + 1}">1</span> of <span th:text="${note.imageUrls.size()}">0</span></p>
                                    </div>
                                </div>
                            </div>
                            <button th:if="${note.imageUrls.size() > 1}" class="carousel-control-prev" type="button" data-bs-target="#noteCarousel" data-bs-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Previous</span>
                            </button>
                            <button th:if="${note.imageUrls.size() > 1}" class="carousel-control-next" type="button" data-bs-target="#noteCarousel" data-bs-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Next</span>
                            </button>
                        </div>
                    </div>
                    <div class="card-footer text-center text-muted">
                        <p class="mb-0 small">Use arrows to slide through pages</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
