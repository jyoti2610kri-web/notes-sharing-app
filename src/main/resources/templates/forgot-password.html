<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Reset Password')}"></head>
<body class="bg-light">
    <div class="container content-wrapper">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-5 text-center">
                        <i class="bi bi-shield-lock text-primary display-4 mb-4"></i>
                        <h2 class="card-title mb-4">Reset Your Password</h2>
                        <p class="text-muted mb-4">Provide your registered email and university to set a new password.</p>
                        
                        <div th:if="${error}" class="alert alert-danger mb-4" th:text="${error}">Error</div>
                        
                        <form th:action="@{/forgot-password}" method="post">
                            <div class="mb-3 text-start">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your registered email">
                            </div>
                            <div class="mb-3 text-start">
                                <label for="university" class="form-label">University Name</label>
                                <input type="text" class="form-control" id="university" name="university" required placeholder="Enter your university name">
                            </div>
                            <div class="mb-4 text-start">
                                <label for="newPassword" class="form-label">New Password</label>
                                <input type="password" class="form-control" id="newPassword" name="newPassword" required placeholder="Enter new password">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">Reset Password</button>
                            <p class="mb-0"><a th:href="@{/login}" class="text-decoration-none">Back to Login</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
