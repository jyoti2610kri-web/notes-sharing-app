<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Forgot Password')}"></head>
<body class="bg-light">
    <div class="container content-wrapper">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body p-5 text-center">
                        <i class="bi bi-shield-lock text-primary display-4 mb-4"></i>
                        <h2 class="card-title mb-4">Forgot Password</h2>
                        <p class="text-muted mb-4">Enter your registered email and we'll send you an OTP to reset your password.</p>
                        
                        <div th:if="${error}" class="alert alert-danger mb-4" th:text="${error}">Error</div>
                        
                        <form th:action="@{/forgot-password}" method="post">
                            <div class="mb-4 text-start">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">Send OTP</button>
                            <p class="mb-0"><a th:href="@{/login}" class="text-decoration-none">Back to Login</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
