<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Upload Note')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container content-wrapper">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm mt-4">
                    <div class="card-body p-4">
                        <h2 class="card-title mb-4 text-center"><i class="bi bi-cloud-upload me-2 text-primary"></i>Upload New Note</h2>
                        
                        <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="title" class="form-label">Note Title</label>
                                <input type="text" class="form-control" id="title" name="title" required placeholder="e.g. Data Structures Unit 1">
                            </div>
                            <div class="mb-3">
                                <label for="category" class="form-label">Category / Subject</label>
                                <select class="form-select" id="category" name="category" required>
                                    <option value="" selected disabled>Select a category</option>
                                    <option value="Computer Science">Computer Science</option>
                                    <option value="Mathematics">Mathematics</option>
                                    <option value="Physics">Physics</option>
                                    <option value="Chemistry">Chemistry</option>
                                    <option value="Management">Management</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" name="description" rows="3" placeholder="Briefly describe what's in the note..."></textarea>
                            </div>
                            <div class="mb-4">
                                <label for="files" class="form-label">Select Images (Pages of your Note)</label>
                                <input class="form-control" type="file" id="files" name="files" multiple required accept="image/*">
                                <div class="form-text text-muted">Select all images that make up your note. They will be bundled into a single PDF for others to download.</div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary"><i class="bi bi-upload me-1"></i>Publish Note</button>
                                <a th:href="@{/dashboard}" class="btn btn-light">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
