<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Dashboard')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container content-wrapper">
        <div class="row mb-4 align-items-center">
            <div class="col">
                <h1>Welcome, <span class="text-primary" th:text="${user.name}">Student</span>!</h1>
                <p class="text-muted mb-0">User ID: <span th:text="${user.id}">ID</span></p>
                <p class="text-muted"><i class="bi bi-building me-1"></i>University: <strong th:text="${user.university}">University</strong></p>
            </div>
            <div class="col-auto">
                <a th:href="@{/upload}" class="btn btn-primary"><i class="bi bi-cloud-upload me-1"></i>Upload New Note</a>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <h2 class="mb-4">My Uploaded Notes</h2>
                <div th:if="${notes.empty}" class="alert alert-info text-center py-5">
                    <i class="bi bi-journal-x display-4 mb-3 d-block"></i>
                    <p class="mb-0">You haven't uploaded any notes yet. Start sharing your knowledge!</p>
                </div>
                <div class="row row-cols-1 row-cols-md-3 g-4" th:if="${!notes.empty}">
                    <div th:each="note : ${notes}" class="col">
                        <div class="card h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between mb-2">
                                    <span class="badge bg-info text-dark" th:text="${note.category != null ? note.category : 'General'}">Category</span>
                                    <small class="text-muted" th:text="${note.uploadDate}">Date</small>
                                </div>
                                <h5 class="card-title" th:text="${note.title}">Title</h5>
                                <p class="card-text" th:text="${note.description}">Description</p>
                            </div>
                            <div class="card-footer bg-transparent border-top-0 pb-3">
                                <div class="d-flex flex-column gap-2">
                                    <div class="d-flex gap-2">
                                        <a th:href="@{'/view-note/' + ${note.id}}" class="btn btn-primary btn-sm flex-grow-1"><i class="bi bi-eye me-1"></i>View</a>
                                        <a th:href="@{'/download/' + ${note.id}}" class="btn btn-success btn-sm flex-grow-1"><i class="bi bi-download me-1"></i>Download</a>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <a th:href="@{'/edit/' + ${note.id}}" class="btn btn-outline-secondary btn-sm flex-grow-1"><i class="bi bi-pencil me-1"></i>Edit</a>
                                        <a th:href="@{'/delete/' + ${note.id}}" class="btn btn-outline-danger btn-sm flex-grow-1" onclick="return confirm('Are you sure you want to delete this note?')"><i class="bi bi-trash me-1"></i>Delete</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12 mt-5 mb-3 text-center">
                <hr>
                <p class="text-muted small">Account Actions</p>
                <a th:href="@{/delete-account}" class="btn btn-sm btn-outline-danger" 
                   onclick="return confirm('WARNING: Are you sure you want to delete your account? This will permanently delete your profile and ALL your uploaded notes. This action cannot be undone.')">
                   <i class="bi bi-person-x me-1"></i>Delete My Account
                </a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
