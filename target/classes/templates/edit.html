<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Edit Note')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container content-wrapper">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm mt-4">
                    <div class="card-body p-4">
                        <h2 class="card-title mb-4 text-center"><i class="bi bi-pencil-square me-2 text-primary"></i>Edit Note Details</h2>
                        
                        <form th:action="@{/edit}" method="post">
                            <input type="hidden" name="id" th:value="${note.id}">
                            <div class="mb-3">
                                <label for="title" class="form-label">Note Title</label>
                                <input type="text" class="form-control" id="title" name="title" th:value="${note.title}" required>
                            </div>
                            <div class="mb-3">
                                <label for="category" class="form-label">Category / Subject</label>
                                <select class="form-select" id="category" name="category" required>
                                    <option value="Computer Science" th:selected="${note.category == 'Computer Science'}">Computer Science</option>
                                    <option value="Mathematics" th:selected="${note.category == 'Mathematics'}">Mathematics</option>
                                    <option value="Physics" th:selected="${note.category == 'Physics'}">Physics</option>
                                    <option value="Chemistry" th:selected="${note.category == 'Chemistry'}">Chemistry</option>
                                    <option value="Management" th:selected="${note.category == 'Management'}">Management</option>
                                    <option value="Other" th:selected="${note.category == 'Other'}">Other</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" name="description" rows="3" th:text="${note.description}"></textarea>
                            </div>
                            <div class="alert alert-info">
                                <small><i class="bi bi-info-circle me-1"></i> Note: You cannot change the uploaded file. To use a different file, please delete this note and upload a new one.</small>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                                <a th:href="@{/dashboard}" class="btn btn-light">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
