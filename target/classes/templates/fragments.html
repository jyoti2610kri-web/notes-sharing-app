<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Notes Sharing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        html, body { height: 100%; }
        body { display: flex; flex-direction: column; background-color: #f8f9fa; }
        .content-wrapper { flex: 1 0 auto; }
        .footer { flex-shrink: 0; }
        .navbar { margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .btn-primary { background-color: #0d6efd; }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" th:href="@{/dashboard}"><i class="bi bi-journal-bookmark-fill me-2"></i>NoteShare</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-house-door me-1"></i>My Notes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/upload}"><i class="bi bi-cloud-upload me-1"></i>Upload</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/search}"><i class="bi bi-search me-1"></i>Search</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-danger" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <div th:fragment="footer" class="footer container-fluid mt-auto py-4 bg-white text-center text-muted border-top">
        <div class="container">
            <p class="mb-0">&copy; <span id="year"></span> NoteShare - Student Notes Sharing Platform</p>
        </div>
        <script>
            document.getElementById("year").textContent = new Date().getFullYear();
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>
</html>
